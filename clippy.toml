# Clippy configuration
# https://doc.rust-lang.org/clippy/configuration.html

# Lint levels can be set in Cargo.toml or here
# This file is for clippy-specific configuration options

# Maximum allowed cognitive complexity for a function
cognitive-complexity-threshold = 30

# Maximum allowed number of lines for a function
too-many-lines-threshold = 100

# Maximum allowed type complexity
type-complexity-threshold = 250

# Maximum allowed number of arguments for a function
too-many-arguments-threshold = 7

# Minimum number of lines to trigger the large-enum-variant lint
enum-variant-size-threshold = 200

# Maximum allowed size for arrays on the stack
array-size-threshold = 512000

# Maximum allowed size for vectors
vec-box-size-threshold = 4096

# Maximum allowed size for stack frames
stack-size-threshold = 512000

# Allowed names for single character bindings
single-char-binding-names-threshold = 4

# Allowed literal representation
literal-representation-threshold = 10

# Configuration for doc-markdown lint
doc-valid-idents = [
    "KiB", "MiB", "GiB", "TiB", "PiB", "EiB",
    "GitHub", "GitLab", "JavaScript", "TypeScript",
    "WebAssembly", "OpenSSL", "NaN",
]

# Avoid linting specific items
# allow-mixed-uninlined-format-args = true
